<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Quorima mark">
  <title>Quorima — Round Table mark</title>
  <!-- Outer ring: the boardroom table -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#6b46c1" stroke-width="4"/>
  <!-- Orchestrator (Chief of Staff) at top, larger -->
  <circle cx="50" cy="8" r="8" fill="#6b46c1"/>
  <!-- Four C-level agents evenly distributed -->
  <circle cx="89.94" cy="37.02" r="5.5" fill="#6b46c1"/>
  <circle cx="74.69" cy="83.98" r="5.5" fill="#6b46c1"/>
  <circle cx="25.31" cy="83.98" r="5.5" fill="#6b46c1"/>
  <circle cx="10.06" cy="37.02" r="5.5" fill="#6b46c1"/>
  <!-- Center convergence accent -->
  <circle cx="50" cy="50" r="2.6" fill="#6b46c1" opacity="0.45"/>
</svg>

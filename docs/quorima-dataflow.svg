<svg width="680" height="330" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Lato, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <title>Quorima dataflow — van VPS-cronjob naar live dashboard</title>
  <desc>De cron draait daily-flash.ts, dat live Twinfield-data ophaalt en JSON-feeds naar de map dashboard/data schrijft. serve-dashboard.mjs leest dezelfde bestanden per request van schijf en serveert ze via de Cloudflare-tunnel met Access aan de browser, die ze bij een reload rendert.</desc>

  <rect x="0" y="0" width="680" height="330" rx="16" fill="#ffffff"/>
  <text x="40" y="34" font-size="16" font-weight="800" fill="#1a2233">Quorima · dataflow</text>
  <text x="40" y="54" font-size="12.5" fill="#6b7387">Van VPS-cronjob naar live dashboard — één gedeelde map, geen database</text>

  <!-- row 1: schrijf-pad (links → rechts) -->
  <rect x="44" y="84" width="132" height="60" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="110" y="110" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2C2C2A">Twinfield</text>
  <text x="110" y="128" text-anchor="middle" font-size="12" fill="#5F5E5A">boekhouding · live</text>

  <rect x="240" y="84" width="200" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="340" y="110" text-anchor="middle" font-size="14.5" font-weight="700" fill="#26215C">daily-flash.ts</text>
  <text x="340" y="128" text-anchor="middle" font-size="12" fill="#534AB7">cron · ma–vr 08:00</text>

  <rect x="496" y="84" width="140" height="60" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="566" y="110" text-anchor="middle" font-size="14.5" font-weight="700" fill="#4A1B0C">JSON op schijf</text>
  <text x="566" y="128" text-anchor="middle" font-size="12" fill="#993C1D">dashboard/data/</text>

  <line x1="176" y1="114" x2="226" y2="114" stroke="#888780" stroke-width="2"/>
  <polygon points="233,114 226,110 226,118" fill="#888780"/>
  <text x="205" y="107" text-anchor="middle" font-size="12" fill="#6b7387">OAuth2-pull</text>

  <line x1="440" y1="114" x2="483" y2="114" stroke="#888780" stroke-width="2"/>
  <polygon points="490,114 483,110 483,118" fill="#888780"/>
  <text x="466" y="107" text-anchor="middle" font-size="12" fill="#6b7387">schrijft</text>

  <!-- overdracht: dezelfde bestanden, boven geschreven, onder gelezen -->
  <line x1="566" y1="144" x2="566" y2="213" stroke="#888780" stroke-width="2"/>
  <polygon points="566,220 562,213 570,213" fill="#888780"/>
  <text x="576" y="186" text-anchor="start" font-size="12" fill="#6b7387">zelfde map</text>

  <!-- row 2: serveer-pad (rechts → links) -->
  <rect x="440" y="224" width="196" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="538" y="250" text-anchor="middle" font-size="14.5" font-weight="700" fill="#26215C">serve-dashboard.mjs</text>
  <text x="538" y="268" text-anchor="middle" font-size="12" fill="#534AB7">leest per request</text>

  <rect x="212" y="224" width="180" height="60" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="302" y="250" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2C2C2A">Cloudflare-tunnel</text>
  <text x="302" y="268" text-anchor="middle" font-size="12" fill="#5F5E5A">+ Access · alleen jij</text>

  <rect x="44" y="224" width="132" height="60" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="110" y="250" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2C2C2A">Jouw browser</text>
  <text x="110" y="268" text-anchor="middle" font-size="12" fill="#5F5E5A">rendert bij reload</text>

  <line x1="440" y1="254" x2="403" y2="254" stroke="#888780" stroke-width="2"/>
  <polygon points="396,254 403,250 403,258" fill="#888780"/>
  <text x="416" y="247" text-anchor="middle" font-size="12" fill="#6b7387">:8787</text>

  <line x1="212" y1="254" x2="175" y2="254" stroke="#888780" stroke-width="2"/>
  <polygon points="168,254 175,250 175,258" fill="#888780"/>
  <text x="190" y="247" text-anchor="middle" font-size="12" fill="#6b7387">dev.quorima.ai</text>

  <!-- legenda -->
  <rect x="44" y="300" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="62" y="310" font-size="11.5" fill="#6b7387">extern / edge</text>
  <rect x="160" y="300" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="178" y="310" font-size="11.5" fill="#6b7387">Quorima-code</text>
  <rect x="300" y="300" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="318" y="310" font-size="11.5" fill="#6b7387">data op schijf</text>
</svg>
